get:
  tags:
  - TEF (Agente local)
  summary: GET GetPending
  operationId: get_v1_charge_pending
  description: Verifique as transações pendentes de confirmação do serviço.
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              charges:
                type: array
                description: Transações pendentes de confirmação.
                items:
                  type: object
                  properties:
                    acquirerName:
                      type: string
                      description: Nome da adquirete.
                    aid:
                      type: string
                      description: AID do cartão utilizado.
                    amount:
                      type: integer
                      format: int32
                      description: Valor da transação em centavos.
                    authorizationCode:
                      type: string
                      description: Código de autorização retornado pelo emissor.
                    authorizationResponseCode:
                      type: string
                      description: Código de autorização retornado pela rede credenciadora.
                    balance:
                      type: integer
                      format: int32
                      description: Saldo para cartão do tipo voucher.
                    brand:
                      type: string
                      description: Bandeira.
                    cancelationDateTime:
                      type: string
                      description: Data de cancelamento da transação.
                    captureDateTime:
                      type: string
                      description: Data de captura da transação.
                    cardHolderName:
                      type: string
                      description: Nome do portador do cartão.
                    cardNumber:
                      type: string
                      description: Número mascarado do cartão utilizado, apenas ultimos digitos.
                    cardholderReceipt:
                      type: array
                      items:
                        type: string
                      description: Recibo em via unica destinada ao portador, cada string da lista representa uma linha do recibo.
                    creationDateTime:
                      type: string
                      format: date-time
                      description: Data de criação da transação.
                    installmentNumber:
                      type: integer
                      format: int32
                      description: Numero de parcelas da transação.
                    installmentType:
                      $ref: ../components/schemas/InstallmentType.yaml
                      description: Tipo de parcelamento em caso de tipo de transação crédito.
                    isApproved:
                      type: boolean
                      description: Define se a transação foi aprovada ou não.
                    isCanceled:
                      type: boolean
                      description: Define se a transação foi cancelada ou não.
                    merchantChargeId:
                      type: string
                      description: Identificador da transação pelo lojista.
                    merchantIdOnAcquirer:
                      type: string
                      description: Identificador do lojista registrado na adquirente.
                    merchantReceipt:
                      type: array
                      items:
                        type: string
                      description: Recibo via do lojista, cada string da lista representa uma linha do recibo.
                    nsu:
                      type: string
                      description: Número Sequencial Único (NSU) da transação no GerenciadorPadrãoTEF.
                    origin:
                      type: string
                      description: Identificador da origem da transação.
                    paymentType:
                      $ref: ../components/schemas/PaymentType.yaml
                      description: Tipo da transação.
                    transactionId:
                      type: string
                      description: Número Sequencial Único (NSU) da autorização, caso o pagamento seja aprovado pelo Emissor.
              errors:
                type: array
                items:
                  type: object
                  properties:
                    errorCode:
                      type: string
                      description: Código de erro.
                    message:
                      type: string
                      description: Mensagem de erro.
                description: Contém a lista de erros, se algum ocorreu.
              success:
                type: boolean
                description: Define se a comunicação com o gateway safrapay foi bem sucedida.
          example:
            charges:
            - acquirerName: Simulator
              aid: A0000000041010
              amount: 100
              authorizationCode: null
              authorizationResponseCode: null
              balance: 0
              brand: MasterCard
              cancelationDateTime: null
              captureDateTime: null
              cardHolderName: null
              cardNumber: 550209******9149
              cardholderReceipt:
              - "      SIMULATOR - VIA DO CLIENTE      "
              - "             MK TEC TESTE             "
              - "       CNPJ: 99.951.985/0001-99       "
              - "           CREDITO A VISTA            "
              - "                                      "
              - "***************9149  21/09/2021  18:30"
              - "TESTE/TESTE R C                       "
              - "EC: 123                    AUT: 923428"
              - "DOC TEF: 000000005                    "
              - "AID: A0000000041010                   "
              - "MASTERCARD CREDIT                     "
              - "TOTAL:                         R$ 1,00"
              - "          DOC TEF: 000000005          "
              - "                                 1.2.6"
              creationDateTime: '2021-09-21T18:30:53.522011-03:00'
              installmentNumber: 0
              installmentType: None
              isApproved: true
              isCanceled: false
              merchantChargeId: '720003190817132316322598510002'
              merchantIdOnAcquirer: null
              merchantReceipt:
              - "      SIMULATOR - VIA DO LOJISTA      "
              - "             MK TEC TESTE             "
              - "       CNPJ: 99.951.985/0001-99       "
              - "           CREDITO A VISTA            "
              - "                                      "
              - "***************9149  21/09/2021  18:30"
              - "TESTE/TESTE R C                       "
              - "EC: 123                    AUT: 923428"
              - "DOC TEF: 000000005                    "
              - "AC: 931FFFAC7F84A5CD           ONL-EMV"
              - "AID: A0000000041010                   "
              - "MASTERCARD CREDIT                     "
              - "                                      "
              - "TOTAL:                         R$ 1,00"
              - "     TRANSAÇÃO APROVADA COM SENHA     "
              - "          DOC TEF: 000000005          "
              - "                                 1.2.6"
              nsu: '000000005'
              origin: null
              paymentType: Credit
              transactionId: 85b7ce7c-d57b-4665-8d7e-7e81cb715378
            errors: []
            success: true
    '400':
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Não autenticado / token inválido
  security:
  - partnerToken: []
  servers:
  - url: http://localhost:4090
    description: Agente TEF local (GerenciadorPadrãoTEF / INTPOS)
