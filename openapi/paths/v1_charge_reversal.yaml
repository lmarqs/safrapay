get:
  tags:
  - TEF (Agente local)
  summary: GET Reversal
  operationId: get_v1_charge_reversal
  description: 'Envia requisição de desfazimento de transação. Comumente utilizada quando a aplicação integradora não terminou o processamento necessário após aprovação da transação (ex.: falha na emissão de nota-fiscal, falha ao liberar produto para o cliente). Só é possível desfazer uma transação que ainda não foi confirmada.'
  parameters:
  - name: nsu
    in: query
    required: true
    schema:
      type: string
    description: Número Sequencial Único (NSU) da transação a ser desfeita.
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              canceled:
                type: boolean
                description: Define se a transação foi cancelada ou não.
              cardholderReceipt:
                type: array
                items:
                  type: string
                description: Recibo em via unica destinada ao portador, cada string da lista representa uma linha do recibo.
              merchantReceipt:
                type: array
                items:
                  type: string
                description: Recibo via do lojista, cada string da lista representa uma linha do recibo.
              charge:
                type: object
                description: Dados da cobrança.
                properties:
                  chargeStatus:
                    type: string
                    description: Estado da cobrança.
                  id:
                    type: string
                    description: ID da cobrança.
                  merchantChargeId:
                    type: string
                    description: Identificador da transação pelo lojista.
                  nsu:
                    type: string
                    description: Número Sequencial Único (NSU) da transação no GerenciadorPadrãoTEF.
                  origin:
                    type: string
                    description: Identificador da origem da transação.
                  transactions:
                    type: array
                    description: Transações da cobrança.
                    items:
                      type: object
                      properties:
                        acquirer:
                          type: string
                          description: Nome da adquirente.
                        amount:
                          type: integer
                          format: int32
                          description: Valor da transação em centavos.
                        authorizationCode:
                          type: string
                          description: Código de autorização retornado pelo emissor.
                        authorizationResponseCode:
                          type: string
                          description: Código de autorização retornado pela rede credenciadora.
                        canceledDateTime:
                          type: string
                          format: date-time
                          description: Data de cancelamento da transação.
                        captureDateTime:
                          type: string
                          description: Data de captura da transação.
                        card:
                          type: object
                          description: Dados EMV do cartão utilizado.
                          properties:
                            aditumEmvTags1Ac:
                              type: string
                              description: TAGs EMV do primeiro Application Cryptogram.
                            aditumEmvTags2Ac:
                              type: string
                              description: TAGs EMV do segundo Application Cryptogram.
                            aid:
                              type: string
                              description: AID do cartão utilizado.
                            balance:
                              type: integer
                              format: int32
                              description: Saldo para cartão do tipo voucher.
                            brand:
                              type: string
                              description: Bandeira.
                            cardNumber:
                              type: string
                              description: Número mascarado do cartão utilizado, apenas ultimos digitos.
                            cardholderName:
                              type: string
                              description: Nome do portador do cartão.
                            cvv:
                              type: string
                              description: Card Verification Value (CVV).
                            cvvMissingReason:
                              type: string
                              description: Razão pela qual o CVV possa estar faltando.
                            dataEncryptionType:
                              type: string
                              description: Tipo de encriptação dos dados do cartão.
                            emvTags:
                              type: string
                              description: TAGs EMV adicionais.
                            entryMode:
                              $ref: ../components/schemas/EntryMode.yaml
                              description: Forma de entrada do cartão.
                            expirationMonth:
                              type: integer
                              format: int32
                              description: O Mês de expiração do cartão com 2 dígitos.
                            expirationYear:
                              type: integer
                              format: int32
                              description: O Ano de expiração do cartão com 4 dígitos.
                            fallback:
                              type: boolean
                              description: Indica se houve fallback (fita magnética substituta).
                            issuerScript:
                              type: string
                              description: Script de retorno do emissor.
                            ksn:
                              type: string
                              description: Key Serial Number, usado em criptografia de PIN.
                            maxCvvLength:
                              type: integer
                              format: int32
                              description: Tamanho máximo aceito do CVV.
                            pinBlock:
                              type: string
                              description: Bloco de PIN criptografado.
                            pinEncryptionType:
                              type: string
                              description: Tipo de encriptação do PIN.
                            pinVerifiedOffline:
                              type: boolean
                              description: Indica se o PIN foi verificado offline.
                            sequenceNumber:
                              type: string
                              description: Número de sequência do cartão.
                            signatureRequired:
                              type: boolean
                              description: Indica se assinatura é requerida.
                            track1:
                              type: string
                              description: Trilha 1 da tarja magnética.
                            track2:
                              type: string
                              description: Trilha 2 da tarja magnética.
                        cardholderReceipt:
                          type: array
                          items:
                            type: string
                          description: Recibo em via unica destinada ao portador, cada string da lista representa uma linha do recibo.
                        creationDateTime:
                          type: string
                          format: date-time
                          description: Data de criação da transação.
                        deviceId:
                          type: string
                          description: Identificador do terminal utilizado.
                        errorCode:
                          type: string
                          description: Código de erro.
                        errorMessage:
                          type: string
                          description: Mensagem de erro.
                        installmentNumber:
                          type: integer
                          format: int32
                          description: Numero de parcelas da transação.
                        installmentType:
                          $ref: ../components/schemas/InstallmentType.yaml
                          description: Tipo de parcelamento em caso de tipo de transação crédito.
                        isApproved:
                          type: boolean
                          description: Define se a transação foi aprovada ou não.
                        isCanceled:
                          type: boolean
                          description: Define se a transação foi cancelada ou não.
                        isCapture:
                          type: boolean
                          description: Define se a transação foi capturada.
                        merchantReceipt:
                          type: array
                          items:
                            type: string
                          description: Recibo via do lojista, cada string da lista representa uma linha do recibo.
                        merchantTransactionId:
                          type: string
                          description: Identificador da transação atribuído pelo lojista.
                        needCompletion:
                          type: boolean
                          description: Indica se a transação necessita de confirmação.
                        paymentType:
                          $ref: ../components/schemas/PaymentType.yaml
                          description: Tipo da transação.
                        pinpadErrorMessage:
                          type: string
                          description: Mensagem de erro retornada pelo pinpad.
                        softDescriptor:
                          type: string
                          description: Breve descrição a ser apresentada na fatura bancária do cliente.
                        transactionStatus:
                          type: string
                          description: Estado da transação.
              errors:
                type: array
                items:
                  type: object
                  properties:
                    errorCode:
                      type: integer
                      format: int32
                      description: Código de erro.
                    message:
                      type: integer
                      description: Mensagem de erro.
                description: Contém a lista de erros, se algum ocorreu.
              success:
                type: boolean
                description: Define se a comunicação com o gateway safrapay foi bem sucedida.
          example:
            canceled: true
            cardholderReceipt:
            - "      SIMULATOR - VIA DO CLIENTE      "
            - "             MK TEC TESTE             "
            - "       CNPJ: 99.951.985/0001-99       "
            - "             CANCELAMENTO             "
            - "                                      "
            - "***************9149  21/09/2021  18:38"
            - "MASTERCARD CREDIT                     "
            - "AUT: 923428                           "
            - "VALOR:                         R$ 1,00"
            - "          DOC TEF: 000000005          "
            - "                                 1.2.6"
            charge:
              chargeStatus: Canceled
              id: 85b7ce7c-d57b-4665-8d7e-7e81cb715378
              merchantChargeId: '720003190817132316322598510002'
              nsu: '000000005'
              origin: null
              transactions:
              - acquirer: Simulator
                amount: 100
                authorizationCode: '923428'
                authorizationResponseCode: '00'
                canceledDateTime: '2021-09-21T18:38:46.6955536-03:00'
                captureDateTime: null
                card:
                  aditumEmvTags1Ac: 
                  aditumEmvTags2Ac: null
                  aid: A0000000041010
                  balance: null
                  brand: MasterCard
                  cardNumber: 550209******9149
                  cardholderName: null
                  cvv: null
                  cvvMissingReason: null
                  dataEncryptionType: Undefined
                  emvTags: null
                  entryMode: Emv
                  expirationMonth: 2
                  expirationYear: 2027
                  fallback: false
                  issuerScript: null
                  ksn: null
                  maxCvvLength: 0
                  pinBlock: null
                  pinEncryptionType: Undefined
                  pinVerifiedOffline: false
                  sequenceNumber: null
                  signatureRequired: false
                  track1: null
                  track2: null
                cardholderReceipt:
                - "      SIMULATOR - VIA DO CLIENTE      "
                - "             MK TEC TESTE             "
                - "       CNPJ: 99.951.985/0001-99       "
                - "             CANCELAMENTO             "
                - "                                      "
                - "***************9149  21/09/2021  18:38"
                - "MASTERCARD CREDIT                     "
                - "AUT: 923428                           "
                - "VALOR:                         R$ 1,00"
                - "          DOC TEF: 000000005          "
                - "                                 1.2.6"
                creationDateTime: '2021-09-21T18:30:53.522-03:00'
                deviceId: '7200031908171323'
                errorCode: null
                errorMessage: null
                installmentNumber: 0
                installmentType: None
                isApproved: true
                isCanceled: true
                isCapture: true
                merchantReceipt:
                - "      SIMULATOR - VIA DO LOJISTA      "
                - "             MK TEC TESTE             "
                - "       CNPJ: 99.951.985/0001-99       "
                - "             CANCELAMENTO             "
                - "                                      "
                - "***************9149  21/09/2021  18:38"
                - "MASTERCARD CREDIT                     "
                - "AUT: 923428                           "
                - "VALOR:                         R$ 1,00"
                - "          DOC TEF: 000000005          "
                - "                                 1.2.6"
                merchantTransactionId: '720003190817132316322598510002'
                needCompletion: true
                paymentType: Credit
                pinpadErrorMessage: null
                softDescriptor: TASK*5333
                transactionStatus: Canceled
            errors: []
            merchantReceipt:
            - "      SIMULATOR - VIA DO LOJISTA      "
            - "             MK TEC TESTE             "
            - "       CNPJ: 99.951.985/0001-99       "
            - "             CANCELAMENTO             "
            - "                                      "
            - "***************9149  21/09/2021  18:38"
            - "MASTERCARD CREDIT                     "
            - "AUT: 923428                           "
            - "VALOR:                         R$ 1,00"
            - "          DOC TEF: 000000005          "
            - "                                 1.2.6"
            success: true
    '400':
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Não autenticado / token inválido
  security:
  - partnerToken: []
  servers:
  - url: http://localhost:4090
    description: Agente TEF local (GerenciadorPadrãoTEF / INTPOS)
