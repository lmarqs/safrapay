get:
  tags:
  - TEF (Agente local)
  summary: GET Abort
  operationId: get_v1_charge_authorization_abort
  description: Aborta o fluxo de pagamento em andamento iniciado por `POST /v1/charge/authorization`.
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: object
                  properties:
                    errorCode:
                      type: string
                      description: Código de erro.
                    message:
                      type: string
                      description: Mensagem de erro.
                description: Contém a lista de erros, se algum ocorreu.
              success:
                type: boolean
                description: Define se a operação foi executada com sucesso.
          example:
            errors: []
            success: false
    '400':
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Não autenticado / token inválido
  security:
  - partnerToken: []
  servers:
  - url: http://localhost:4090
    description: Agente TEF local (GerenciadorPadrãoTEF / INTPOS)
