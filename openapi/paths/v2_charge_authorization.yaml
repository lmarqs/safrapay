post:
  tags:
  - Pagamentos
  summary: POST /charge/authorization
  operationId: post_v2_charge_authorization
  description: 'Endpoint compartilhado. Variações documentadas: Crédito à vista, Crédito parcelado, Voucher, Captura automática, Tokenização por Bandeira, 2. Recorrência Pass-Through com 3DS + 3RI (MIT).'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            capture:
              type: boolean
              description: Se a cobrança deve ou não ser capturada.
            charge:
              type: object
              properties:
                chargeStatus:
                  type: integer
                  format: int32
                  description: Status atual da cobrança, indicando em qual estágio do processo de autorização a cobrança está. Ele reflete diretamente todos os status de transação dentro da cobrança.
                customer:
                  type: object
                  properties:
                    address:
                      type: object
                      properties:
                        city:
                          type: string
                          description: Cidade.
                        complement:
                          type: string
                          description: Complemento.
                        country:
                          type: string
                          description: País.
                        neighborhood:
                          type: string
                          description: Bairro.
                        number:
                          type: string
                          description: Número.
                        state:
                          type: string
                          description: Estado.
                        street:
                          type: string
                          description: Rua.
                        zipCode:
                          type: string
                          description: CEP.
                      required:
                      - city
                      - complement
                      - country
                      - neighborhood
                      - number
                      - state
                      - street
                      - zipCode
                      description: Endereço do comprador. Obrigatório caso utilize antifraude.
                    bankAccounts:
                      type: object
                      properties:
                        account:
                          type: string
                          description: Conta bancária.
                        accountCheckDigit:
                          type: string
                          description: Dígito de verificação da conta bancária.
                        bankCode:
                          type: string
                          description: Código do banco.
                        bankName:
                          type: string
                          description: Nome do banco.
                        branch:
                          type: string
                          description: Filial.
                        branchCheckDigit:
                          type: string
                          description: Dígito de verificação da filial.
                        isActive:
                          type: boolean
                          description: Se a conta está ativa ou não.
                        type:
                          type: integer
                          format: int32
                          description: Tipo de conta.
                      required:
                      - account
                      - accountCheckDigit
                      - bankCode
                      - bankName
                      - branch
                      - branchCheckDigit
                      - isActive
                      - type
                      description: Contas do comprador.
                    birthday:
                      type: string
                      format: date
                      description: Data de nascimento do comprador.
                    document:
                      type: string
                      description: Documento do comprador.
                    documentType:
                      $ref: ../components/schemas/DocumentType.yaml
                      description: Tipo do documento do comprador.
                    email:
                      type: string
                      description: E-mail do comprador.
                    entityType:
                      $ref: ../components/schemas/EntityType.yaml
                      description: Se é pessoa física ou jurídica.
                    gender:
                      $ref: ../components/schemas/Gender.yaml
                      description: Gênero do comprador.
                    id:
                      type: string
                      description: O ID do comprador.
                    isActive:
                      type: boolean
                      description: Se o comprador está ativo ou não.
                    name:
                      type: string
                      description: Nome completo do comprador.
                    phone:
                      type: object
                      properties:
                        areaCode:
                          type: string
                          description: Código de área.
                        countryCode:
                          type: string
                          description: Código do país.
                        number:
                          type: string
                          description: Número do Telefone.
                        type:
                          $ref: ../components/schemas/Phone.yaml
                          description: Tipo do telefone.
                      required:
                      - areaCode
                      - countryCode
                      - number
                      - type
                      description: Telefone do comprador.
                  description: Dados do comprador.
                gatewayId:
                  type: string
                  description: Gateway ID criado para o cliente para uso de autorização do Safra.
                id:
                  type: string
                  description: O ID da cobrança.
                macAddress:
                  type: string
                  description: Endereço MAC (Media Access Control) do dispositivo de origem usado para identificar exclusivamente um controlador de interface de rede.
                merchantChargeId:
                  type: string
                  description: 'O ID de cobrança definido pelo sistema do comerciante. Não utilize espaços no meio do identificador (ex.: TASK5333 ). Campos obrigatórios da estrutura não podem ser enviados vazios nem como string vazia "" .'
                metadata:
                  type: object
                  properties:
                    key:
                      type: string
                      description: O nome da chave (campo)
                    value:
                      type: string
                      description: O valor da chave.
                  description: Entradas coletadas para iniciação do evento.
                origin:
                  type: string
                  description: Uma propriedade que o cliente pode usar para identificar a origem da cobrança, como nome do fornecedor ou identificador.
                products:
                  type: array
                  items:
                    type: object
                    properties:
                      amount:
                        type: integer
                        format: int32
                        description: Valor do produto.
                      description:
                        type: string
                        description: Descrição do produto.
                      id:
                        type: string
                        description: UUID do produto.
                      imagesRef:
                        type: array
                        items:
                          type: string
                      isActive:
                        type: boolean
                        description: Define se o produto está ativo ou não.
                      membershipFee:
                        type: integer
                        format: int32
                        description: Taxa que o cliente paga para ter o produto.
                      name:
                        type: integer
                        format: int32
                        description: Nome do produto.
                      quantity:
                        type: integer
                        format: int32
                        description: Quantidade do produto no carrinho.
                      sku:
                        type: string
                        description: ID único definido pelo comércio para identificar o produto na nossa base de dados (Stock Keeping Unit).
                receivers:
                  type: array
                  items:
                    type: object
                    properties:
                      amount:
                        type: number
                        format: float
                        description: Valor.
                      chargeRemainder:
                        type: boolean
                        description: Após processar os valores divididos para cada parte, se houver centavos que sobraram da divisão, este campo indica qual destinatário deverá receber os centavos restantes. Também pode ser definido para divisão de centavos (exemplo 100/3) ou para quando o destinatário não tiver regra especifica.
                      fixedAmountComission:
                        type: number
                        format: float
                        description: Valor fixo que o destinatário deve receber.
                      id:
                        type: string
                        description: Documento identificador.
                      mdrComission:
                        type: number
                        format: float
                        description: Porcentagem relativa ao MDR calculado na liquidação.
                      mdrDiscount:
                        type: boolean
                        description: Define se terá desconto MDR.
                      membershipComission:
                        type: number
                        format: float
                        description: Comissão percentual para transações de associação.
                      percentageComission:
                        type: number
                        format: float
                        description: Esta comissão é calculada no topo do valor da transação.
                    required:
                    - id
                sessionId:
                  type: string
                  description: ID da sessão criada pelo servidor do site do cliente e usada durante a visita de um determinado usuário. Obrigatório caso utilize antifraude.
                shippingAddress:
                  type: object
                  properties:
                    city:
                      type: string
                      description: Cidade.
                    complement:
                      type: string
                      description: Complemento.
                    country:
                      type: string
                      description: Código do  país.
                    neighborhood:
                      type: string
                      description: Bairro.
                    number:
                      type: string
                      description: Número.
                    postalCode:
                      type: string
                      description: Código postal.
                    state:
                      type: string
                      description: Estado.
                    street:
                      type: string
                      description: Rua.
                  description: Representa as informações do endereço de envio.
                shippingSettings:
                  type: array
                  items:
                    type: object
                    properties:
                      amount:
                        type: integer
                        format: int32
                        description: Valor do envio.
                      merchantId:
                        type: string
                        description: ID único do estabelecimento relacionado à configuração de envio.
                smartCheckoutId:
                  type: string
                  description: O ID do smartCheckout.
                source:
                  type: integer
                  format: int32
                  description: Define a fonte de cobrança, por exemplo, um POS, pinpad, site de comércio eletrônico.
                subMerchant:
                  type: object
                  properties:
                    address:
                      type: object
                      properties:
                        city:
                          type: string
                          description: Cidade.
                        complement:
                          type: string
                          description: Complemento.
                        country:
                          type: string
                          description: País.
                        neighborhood:
                          type: string
                          description: Bairro.
                        number:
                          type: string
                          description: Número.
                        state:
                          type: string
                          description: Estado.
                        street:
                          type: string
                          description: Rua.
                        zipCode:
                          type: string
                          description: CEP.
                      required:
                      - city
                      - country
                      - neighborhood
                      - number
                      - state
                      - street
                      - zipCode
                      description: Endereço do submerchant.
                    document:
                      type: string
                      description: Documento do submerchant.
                    id:
                      type: string
                      description: ID do submerchant.
                    socialName:
                      type: string
                      description: Razão social do submerchant.
                  required:
                  - address
                  - document
                  - id
                  - socialName
                  description: Objeto com dados referente ao submerchant (Caso exista submerchant).
                subscriptionId:
                  type: string
                  description: GUID único relacionado ao subscription.
                transactions:
                  type: array
                  description: Uma ou várias transações a serem realizadas dentro da cobrança.
                  items:
                    type: object
                    properties:
                      card:
                        type: object
                        description: O Cartão a ser utilizado na transação. Envie apenas id para um cartão já tokenizado, ou os campos completos do cartão (cardNumber, cvv, brand, cardholderName, cardholderDocument, expirationMonth, expirationYear) para um cartão novo - não é necessário enviar ambos.
                        properties:
                          id:
                            type: string
                            description: ID do cartão tokenizado.
                          customerId:
                            type: string
                            description: O ID do comprador.
                          cardNumber:
                            type: string
                            description: O número impresso na frente do cartão.
                          cvv:
                            type: string
                            description: Card Verification Value (CVV), número de 3-4 dígitos impresso no cartão.
                          cvvMissingReason:
                            type: integer
                            format: int32
                            description: Razão pela qual o CVV não consta na cobrança, se necessário. Mandatório apenas para PagSeguro.
                          brand:
                            $ref: ../components/schemas/CardBrand.yaml
                            description: A bandeira do cartão.
                          cardholderName:
                            type: string
                            description: O nome do títular do cartão.
                          cardholderDocument:
                            type: string
                            description: O documento do títular do cartão.
                          expirationMonth:
                            type: integer
                            format: int32
                            description: O Mês de expiração do cartão com 2 dígitos.
                          expirationYear:
                            type: integer
                            format: int32
                            description: O Ano de expiração do cartão com 4 dígitos.
                          billingAddress:
                            type: object
                            description: É o endereço conectado ao cartão de crédito ou débito. Obrigatório caso utilize antifraude.
                            properties:
                              street:
                                type: string
                                description: Rua.
                              number:
                                type: string
                                description: Número.
                              neighborhood:
                                type: string
                                description: Bairro.
                              city:
                                type: string
                                description: Cidade.
                              state:
                                type: string
                                description: Estado.
                              country:
                                type: string
                                description: País.
                              zipCode:
                                type: string
                                description: CEP.
                              complement:
                                type: string
                                description: Complemento.
                          isPrivateLabel:
                            type: boolean
                            description: Indica se o cartão é um produto de whitelabel ou não. Obrigatório caso utilize antifraude.
                          brandName:
                            type: string
                            description: O nome da bandeira do cartão.
                          cardToken:
                            type: string
                            description: Token do cartão.
                          eci:
                            type: string
                            description: Código de autenticação ECI (retornado apenas quando a transação passa pelo fluxo do 3DS).
                          cavv:
                            type: string
                            description: Criptograma de autenticação (retornado apenas quando a transação passa pelo fluxo do 3DS).
                          xid:
                            type: string
                            description: Identificador MPI da transação autenticada.
                          cardholderAuthenticationVersion:
                            type: string
                            description: Versão da autenticação retornada pelo provedor.
                          metadata:
                            type: object
                            additionalProperties: true
                            description: Armazena todas as credenciais relacionadas à bandeira.
                          cardTransactionId:
                            type: string
                            description: ID para a requisição da transação do cartão.
                          cof:
                            type: boolean
                            description: Indica se a transação é COF (Credentials On File).
                      temporaryCardToken:
                        type: string
                        description: Token do cartão que foi gerado em um endpoint temporário de cartão.
                      externalWallet:
                        type: object
                        description: Informações de carteira externa.
                        properties:
                          type:
                            type: integer
                            format: int32
                            description: Indica qual carteira foi usada.
                          payload:
                            type: string
                            description: Payload enviado pela carteira para processamento.
                          billingAddress:
                            type: object
                            description: Endereço relacionado à conta da carteira externa.
                            properties:
                              street:
                                type: string
                              number:
                                type: string
                              neighborhood:
                                type: string
                              city:
                                type: string
                              state:
                                type: string
                              country:
                                type: string
                              zipCode:
                                type: string
                              complement:
                                type: string
                      paymentType:
                        type: integer
                        format: int32
                        description: Tipo de transação.
                      amount:
                        type: integer
                        format: int32
                        description: O valor do pagamento em centavos.
                      installmentNumber:
                        type: integer
                        format: int32
                        description: Quantidade de parcelas. Só pode ser maior que 1 se o tipo de transação for crédito.
                      installmentType:
                        type: integer
                        format: int32
                        description: Tipo de parcelamento da transação.
                      softDescriptor:
                        type: string
                        description: Breve descrição a ser apresentada na fatura bancária do cliente.
                      merchantTransactionId:
                        type: string
                        description: Identificador de pedido definido pelo sistema do estabelecimento comercial. Não utilize espaços no meio do valor.
                      acquirer:
                        type: integer
                        format: int32
                        description: O ID da adquirente.
                      firstSubscriptionCharge:
                        type: boolean
                        description: Indica se a transação é a primeira cobrança de assinatura.
                      productIds:
                        type: array
                        items:
                          type: string
                        description: O ID de cada produto sendo comprado pela transação.
                      source:
                        type: object
                        description: É a origem da transação.
                        properties:
                          id:
                            type: string
                            description: O ID do SmartCheckout.
                          type:
                            type: integer
                            format: int32
                            description: Tipo de smartCheckout.
                      boardingTaxAmount:
                        type: object
                        description: Representa as informações sobre taxas de embarque para companhias aéreas.
                        properties:
                          amount:
                            type: integer
                            format: int32
                            description: Valor da taxa de embarque cobrada pela companhia aérea.
                          entryAmount:
                            type: integer
                            format: int32
                            description: Valor da taxa de embarque cobrada pela companhia aérea.
                      acquirerKey:
                        type: string
                        description: Número da chave do contrato do adquirente.
                      sdwo:
                        type: object
                        description: Dados do integrador.
                        properties:
                          merchantCode:
                            type: string
                          walletId:
                            type: string
                          mcc:
                            type: string
                          name:
                            type: string
                          document:
                            type: string
                          documentType:
                            type: integer
                            format: int32
                          addressLine:
                            type: string
                          phone:
                            type: object
                            properties:
                              countryCode:
                                type: string
                              areaCode:
                                type: string
                              number:
                                type: string
                              type:
                                $ref: ../components/schemas/Phone.yaml
                          address:
                            type: object
                            properties:
                              city:
                                type: string
                              state:
                                type: string
                              country:
                                type: string
                              zipCode:
                                type: string
                              complement:
                                type: string
                          operationType:
                            type: string
                            description: Opcional quando vazio, por padrão o valor é "BackToBack".
                      authentication:
                        type: object
                        description: Dados informativos para autenticação 3DS.
                        properties:
                          xid:
                            type: string
                          cavv:
                            type: string
                          eci:
                            type: string
                          directoryServer:
                            type: string
                            description: Campo usado apenas para bandeira Elo.
                      isRecurrency:
                        type: boolean
                        description: true para MIT recorrente.
              required:
              - customer
              - source
              - transactions
              description: Dados da transação.
            hostname:
              type: string
              description: O hostname da configuração do comerciante.
            lateCapture:
              type: boolean
              description: 'Informar valor "true" para uma autorização com captura tardia. Valor padrão: false.'
            merchantCode:
              type: string
              description: Código do estabelecimento definido pelo integrador.
            primaryColor:
              type: string
              description: A cor primária da configuração do comerciante.
            remoteIp:
              type: string
              description: '[OBRIGATÓRIO quando antifraude ativo] O endereço IP do comprador. Este dado é utilizado em diversas verificações de risco (número de tentativas de pagamento, verificações baseadas em localização, detecção de uso de VPN/proxy). Suporta IPv4. Exemplo: 192.168.1.100 . Este campo complementa a implementação do Device Fingerprint. Consulte documentação completa .'
            secondaryColor:
              type: string
              description: A cor secundária da configuração do comerciante.
            templateId:
              type: string
              description: TemplateId que será usado para enviar o recibo ao cliente.
          required:
          - charge
        examples:
          Cr_dito_vista:
            summary: Crédito à vista
            value:
              charge:
                merchantChargeId: TASK5333
                customer:
                  name: Ester Patrícia Aparício
                  email: eesterpatriciaaparicio@ladder.com.br
                  document: '71877920002'
                  documentType: 1
                  phone:
                    number: '999999999'
                    countryCode: '55'
                    areaCode: '21'
                    type: 5
                transactions:
                - card:
                    cardNumber: '4444585001234562'
                    cvv: '123'
                    brand: 1
                    cardholderName: Ester Patrícia Aparício
                    cardholderDocument: '71877920002'
                    billingAddress:
                      street: Rua Juvêncio Erudilho
                      number: '39'
                      neighborhood: Centro
                      city: Gurupi
                      state: BA
                      country: BR
                      zipCode: 44002-528
                    expirationMonth: 12
                    expirationYear: 2034
                  paymentType: 2
                  amount: 1000
                  installmentNumber: 0
                  softDescriptor: TASK*5333
                source: 8
          Voucher:
            summary: Voucher
            value:
              charge:
                customer:
                  name: Victor Barbosa
                  email: victor.barbosa@safra.com.br
                  document: '57730954834'
                  documentType: 1
                  phone:
                    number: '972255710'
                    countryCode: 55
                    areaCode: 11
                    type: 5
                transactions:
                - card:
                    cardNumber: '5491670000000005'
                    cvv: '911'
                    brand: 1
                    cardholderName: VICTOR A BARBOSA
                    cardholderDocument: '57730954834'
                    expirationMonth: '09'
                    expirationYear: '2029'
                  paymentType: 3
                  amount: 1500
                  installmentNumber: 1
                source: 1
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              charge:
                type: object
                properties:
                  merchantChargeId:
                    type: string
                    description: O ID de cobrança definido pelo sistema do comerciante.
                  id:
                    type: string
                    description: O ID da cobrança.
                  nsu:
                    type: string
                    description: Identificador do pedido (Safrapay).
                  customerId:
                    type: string
                    description: O ID do comprador.
                  chargeStatus:
                    type: string
                    description: Status atual da cobrança, indicando em qual estágio do processo de autorização a cobrança está. Ele reflete diretamente todos os status de transação dentro da cobrança.
                  transactions:
                    type: array
                    description: Uma ou várias transações realizadas dentro da cobrança.
                    items:
                      type: object
                      properties:
                        card:
                          type: object
                          description: O Cartão a ser utilizado na transação.
                          properties:
                            id:
                              type: string
                              description: O ID do cartão.
                            customerId:
                              type: string
                              description: O ID do comprador.
                            cardNumber:
                              type: string
                              description: O número impresso na frente do cartão.
                            brand:
                              $ref: ../components/schemas/CardBrand.yaml
                              description: A bandeira do cartão à qual o imposto se aplica.
                            cardholderName:
                              type: string
                              description: O nome do títular do cartão.
                            cardholderDocument:
                              type: string
                              description: O documento do títular do cartão.
                            billingAddress:
                              type: object
                              properties:
                                street:
                                  type: string
                                  description: Rua.
                                number:
                                  type: string
                                  description: Número.
                                neighborhood:
                                  type: string
                                  description: Bairro.
                                city:
                                  type: string
                                  description: Cidade.
                                state:
                                  type: string
                                  description: Estado.
                                country:
                                  type: string
                                  description: País.
                                zipCode:
                                  type: string
                                  description: CEP.
                                complement:
                                  type: string
                                  description: Complemento.
                              description: É o endereço conectado ao cartão de crédito ou débito. As empresas usam o endereço de cobrança para verificar o uso autorizado de tal cartão. É também para onde as empresas enviam contas em papel e extratos bancários.
                            isPrivateLabel:
                              type: boolean
                              description: Indica se o cartão é um produto de whitelabel ou não. Whitelabel é um produto ou serviço que uma empresa produz e comercializa com outras empresas que tem interesse em utilizar o mesmo com sua marca estampada.
                            expirationMonth:
                              type: integer
                              format: int32
                              description: O Mês de expiração do cartão com 2 dígitos.
                            expirationYear:
                              type: integer
                              format: int32
                              description: O Ano de expiração do cartão com 4 dígitos.
                            fallback:
                              type: boolean
                              description: Uma bandeira que informa se a cobrança necessária será feita como fita magnética substituta.
                            brandName:
                              type: string
                              description: O nome da bandeira do cartão.
                        isApproved:
                          type: boolean
                          description: Indica se a cobrança está aprovada.
                        paymentType:
                          type: string
                          description: Tipo de transação.
                        installmentType:
                          type: string
                          description: Tipo de parcelamento da transação
                        installmentNumber:
                          type: integer
                          format: int32
                          description: Quantidade de parcelas. Só pode ser maior que 1 se o tipo de transação for crédito.
                        softDescriptor:
                          type: string
                          description: Breve descrição a ser apresentada na fatura bancária do cliente. Este campo aceita apenas strings compostas por letras (maiúsculas ou minúsculas), números e o caractere asterisco (*), sem espaços nem outros símbolos. Formato equivalente à expressão regular `/^[a-zA-Z0-9*]+$/`. Se nulo, ele será preenchido com um rótulo padrão definido pela Safrapay.
                        amount:
                          type: integer
                          format: int32
                          description: O valor do pagamento em centavos.
                        isCapture:
                          type: boolean
                          description: Indica se a cobrança foi capturada.
                        isRecurrency:
                          type: boolean
                          description: Indica se a cobrança é uma recorrência.
                        isCanceled:
                          type: boolean
                          description: Indica se a cobrança foi cancelada.
                        transactionId:
                          type: string
                          description: Número Sequencial Único (NSU) da autorização, caso o pagamento seja aprovado pelo Emissor.
                        transactionStatus:
                          type: string
                          description: Indica qual o status da transação.
                        merchantTransactionId:
                          type: string
                          description: O ID da transação do Lojista
                        acquirer:
                          type: string
