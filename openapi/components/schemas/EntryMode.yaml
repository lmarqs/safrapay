description: |-
  Enumerador `EntryMode`. Aceita o valor inteiro ou a string equivalente.

  * `1` — **MagneticStripe**: Fita Magnética
  * `2` — **Emv**: EMV
  * `3` — **ContactlessMagneticStripe**: Fita Magnética sem contato
  * `4` — **ContactlessEmv**: EMV sem contato
  * `5` — **Typed**: Digitado
