get:
  tags:
  - Recorrência e Planos
  summary: GET /Subscription/{{subscriptionId}}
  operationId: get_v2_subscription_subscriptionId
  parameters:
  - name: subscriptionId
    in: path
    required: true
    schema:
      type: string
    description: O id da assinatura.
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Nome do cliente.
              email:
                type: string
                description: E-mail do cliente.
              startDate:
                type: string
                description: Data de inicio da assinatura.
              endDate:
                type: string
                description: Data de término da assinatura.
              amount:
                type: integer
                format: int32
                description: Valor da assinatura.
              cycles:
                type: integer
                format: int32
                description: Número de vezes que a assinatura irá ser cobrada.
              isActive:
                type: boolean
                description: Indica se a assinatura está ativa ou não.
              card:
                type: object
                x-original-type: '-'
                description: Dados do cartão utilizado na assinatura.
                properties:
                  id:
                    type: string
                    description: ID do cartão utilizado.
                  cardNumber:
                    type: string
                    description: Número do cartão mostrando apenas os 6 primeiros dígitos e os 4 últimos.
                  brandName:
                    type: string
                    description: Bandeira do cartão.
                  cardholderName:
                    type: string
                    description: Nome do titular do cartão.
                  expirationMonth:
                    type: integer
                    format: int32
                    description: Mês da validade do cartão.
                  expirationYear:
                    type: integer
                    format: int32
                    description: Ano da validade do cartão.
                  billingAddress:
                    type: object
                    x-original-type: '-'
                    description: Dados de endereço do cartão.
                    properties:
                      street:
                        type: string
                        description: Rua.
                      number:
                        type: string
                        description: Número.
                      neighborhood:
                        type: string
                        description: Bairro.
                      city:
                        type: string
                        description: Cidade.
                      state:
                        type: string
                        description: Estado.
                      country:
                        type: string
                        description: País.
                      zipCode:
                        type: string
                        description: Cep.
              frequency:
                type: integer
                format: int32
                description: A frequencia do plano.
              charges:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: ID da cobrança.
                    chargeStatus:
                      type: string
                      description: Status da cobrança.
                    chargeDate:
                      type: string
                      description: Data em que a cobrança foi realizada.
                    amount:
                      type: integer
                      format: int32
                      description: Valor da cobrança.
                description: Conjunto composto com as cobranças da assinatura.
              planName:
                type: string
                description: Nome do plano usado na assinatura.
              plan:
                type: object
                x-original-type: '-'
                description: Dados do plano que foi usado na assinatura.
                properties:
                  id:
                    type: string
                    description: ID do plano.
                  amount:
                    type: integer
                    format: int32
                    description: Valor do plano.
                  frequency:
                    type: integer
                    format: int32
                    description: Frequencia do plano.
                  cycles:
                    type: integer
                    format: int32
                    description: Número de vezes que a assinatura irá ser cobrada.
                  freeCycles:
                    type: integer
                    format: int32
                    description: Tempo de carência.
                  frequencyTranslated:
                    type: string
                    description: Indica a frequência do plano.
                  label:
                    type: string
                    description: Descrição sobre o plano.
                  isActive:
                    type: boolean
                    description: Indica se o plano está ativo ou não.
                  merchantId:
                    type: string
                    description: O ID único do estabelecimento.
                  planItems:
                    type: array
                    items:
                      type: object
                      properties:
                        description:
                          type: string
                          description: Descrição do item.
                        value:
                          type: integer
                          format: int32
                          description: O valor do item.
                        quantity:
                          type: integer
                          format: int32
                          description: A quantidade do item.
                    description: Lista com os itens do plano.
                  paymentType:
                    type: string
                    description: Indica o tipo de pagamento.
              subscriptionItems:
                type: array
                items:
                  type: object
                  additionalProperties: true
                description: Lista com os itens da assinatura.
              invoices:
                type: array
                items:
                  type: object
                  additionalProperties: true
                description: Lista com as faturas da assinatura.
              lastUpdate:
                type: string
                description: Data da última atualização da assinatura.
              nextExecution:
                type: string
                description: Data armazena o dia da cobrança.
              nextExecutionJob:
                type: string
                description: Data da próxima cobrança.
              success:
                type: boolean
                description: Se o endpoint processou a requisição com sucesso.
              errors:
                type: array
                items:
                  type: object
                  properties:
                    errorCode:
                      type: integer
                      format: int32
                      description: Código do erro.
                    message:
                      type: string
                      description: Mensagem para identificar qual foi o erro retornado.
                description: 'Se success: false , esse array contem a descrição dos erros retornados.'
              traceKey:
                type: string
                description: Identificador da operação.
          example:
            name: Betina Stefany Gabrielly Nunes
            email: betinastefanygabriellynunes@br.pwc.com
            startDate: '2021-07-13T19:40:02.000'
            endDate: '2023-08-12T00:00:00'
            amount: 1000
            cycles: 24
            isActive: true
            card:
              id: 9d3cc5d6-88d4-7954-a784-7e10ctt55f74
              cardNumber: 444458******4562
              brandName: Visa
              cardholderName: Betina Stefany Gabrielly Nunes
              expirationMonth: 12
              expirationYear: 2032
              billingAddress:
                street: Avenida Lucio Costa
                number: '322'
                neighborhood: Barra da Tijuca
                city: Rio de Janeiro
                state: RJ
                country: BR
                zipCode: '22795007'
            frequency: 3
            charges:
            - id: g9e58745-7895-1235-9632-c782d0999b7c
              chargeStatus: Autorizada
              chargeDate: '2021-07-13T19:40:03.322'
              amount: 1000
            planName: Nome do Plano
            plan:
              id: 60e5c767-8647-465a-a73c-9fd075d00401
              amount: 1000
              frequency: 3
              cycles: 24
              freeCycles: 0
              frequencyTranslated: Mensal
              label: Descrição do plano
              isActive: true
              merchantId: y099b10f-cd9c-9784-8cd9-781a99f2154c
              planItems:
              - description: Item do plano
                value: 1000
                quantity: 1
              paymentType: Credit
            subscriptionItems: []
            invoices: []
            lastUpdate: '2021-07-13T19:40:02.000'
            nextExecution: '2021-08-13T19:40:02.000'
            nextExecutionJob: '2021-08-13T19:00:00.000'
            success: true
            errors: []
            traceKey: d4d39add-c875-4855-95c8-6f5de388aa53
    '400':
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Não autenticado / token inválido
  security:
  - bearerAuth: []
patch:
  tags:
  - Recorrência e Planos
  summary: PATCH /subscription/{{subscriptionId}}
  operationId: patch_v2_subscription_subscriptionId
  description: O Endpoint responsável por atualizar uma nova assinatura.
  parameters:
  - name: subscriptionId
    in: path
    required: true
    schema:
      type: string
    description: O id da assinatura.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            amount:
              type: integer
              format: int32
              description: Novo valor da assinatura a ser cobrado, valor de substituição definido pelo plano.
            isActive:
              type: boolean
              description: Define se a assinatura estará ativa ou não.
            nextDayExecution:
              type: integer
              format: int32
              description: Novo dia de cobrança que a assinatura será cobrada.
            planItems:
              type: array
              description: Os itens que irão compor a assinatura.
              items:
                type: object
                properties:
                  numberofExecutions:
                    type: integer
                    format: int32
                    description: Número de execuções efetuadas.
                  itemCode:
                    type: string
                    description: O código do item.
                  description:
                    type: string
                    description: Descrição do item.
                  value:
                    type: integer
                    format: int32
                    description: Valor do item.
                  quantity:
                    type: integer
                    format: int32
                    description: Quantidade do item.
                  categoryId:
                    type: string
                    description: O ID da categoria do item.
                required:
                - description
          required:
          - nextDayExecution
          - planItems
        example:
          nextDayExecution: 30
          planItems:
          - description: Plano MENSAL de teste atualiza
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              subscription:
                type: object
                properties:
                  id:
                    type: string
                    description: O ID da assinatura.
                  planId:
                    type: string
                    description: O ID do plano.
                  cardId:
                    type: string
                    description: O ID do cartão.
                  capture:
                    type: boolean
                    description: Indica se a transação foi capturada ou apenas pré-autorizadora.
                  quantity:
                    type: integer
                    format: int32
                    description: Quantidade de planos dentro da assinatura
                  customAmount:
                    type: integer
                    format: int32
                    description: Novo valor da assinatura a ser cobrado, valor de substituição definido pelo plano.
                  isActive:
                    type: boolean
                    description: Indica se a assinatura está ativa ou não.
                  nextExecution:
                    type: string
                    description: Data na próxima vez, a assinatura será cobrada.
                  failedAttempts:
                    type: integer
                    format: int32
                    description: Quantidade de tentativas que falharam.
                  charges:
                    type: array
                    items:
                      type: string
                    description: Lista de IDs de cobrança, bem-sucedidos ou não.
                  acquirerCode:
                    type: string
                    description: Nome da adquirente.
                  cycles:
                    type: integer
                    format: int32
                    description: Número de ciclos que a assinatura cobrará do cliente.
                  subscriptionItems:
                    type: array
                    items:
                      type: object
                      properties:
                        description:
                          type: string
                          description: Descrição do item.
                        value:
                          type: integer
                          format: int32
                          description: Valor do item.
                        quantity:
                          type: integer
                          format: int32
                          description: Quantidade do item.
                  frequency:
                    $ref: ../components/schemas/Frequency.yaml
                    description: A frequência com que uma assinatura deve ser cobrada.
                  lastUpdate:
                    type: string
                    description: Data da última atualização da assinatura.
              success:
                type: boolean
                description: Se o endpoint processou a requisição com sucesso.
              errors:
                type: array
                items:
                  type: object
                  properties:
                    errorCode:
                      type: integer
                      format: int32
                      description: Código do erro.
                    message:
                      type: string
                      description: Mensagem para identificar qual foi o erro retornado.
                description: 'Se success: false , esse array contem a descrição dos erros retornados.'
              traceKey:
                type: string
                description: Identificador da operação.
          example:
            subscription:
              id: 096d7bf9-45ee-4891-83ad-eda57b808ee3
              planId: 7d4a4d9f-d3f4-4fad-b290-663c38be6200
              cardId: 7903ef09-83c3-458d-ad39-9ea9e736e59b
              capture: true
              quantity: 1
              customAmount: 2500
              isActive: true
              nextExecution: '2021-08-17T00:00:00'
              failedAttempts: 0
              charges:
              - f9199878-79b2-4367-9832-a7392718c14a
              - 77de44dd-2916-4c12-969c-c0b7eb00cf1e
              acquirerCode: Simulator
              cycles: 12
              subscriptionItems:
              - description: teste 12 meses
                value: 2500
                quantity: 1
              frequency: 3
              lastUpdate: '2021-07-17T03:00:07.542'
            success: true
            errors: []
            traceKey: 491df2aa-ab00-40a5-a836-72f3496564c7
    '400':
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Não autenticado / token inválido
  security:
  - bearerAuth: []
