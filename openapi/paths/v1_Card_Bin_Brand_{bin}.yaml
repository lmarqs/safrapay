get:
  tags:
  - Pagamentos
  summary: GET /Card/Bin/Brand/{bin}
  operationId: get_v1_Card_Bin_Brand_bin
  parameters:
  - name: bin
    in: path
    required: true
    schema:
      type: integer
      format: int32
    description: Os 6 primeiros digítos do cartão.
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              cardBrand:
                type: string
                description: A bandeira do cartão.
              success:
                type: boolean
                description: Se o endpoint processou a requisição com sucesso.
              errors:
                type: array
                items:
                  type: object
                  properties:
                    errorCode:
                      type: integer
                      format: int32
                      description: Código do erro.
                    message:
                      type: string
                      description: Mensagem para identificar qual foi o erro retornado.
                description: 'Se success: false , esse array contem a descrição dos erros retornados.'
              traceKey:
                type: string
                description: Identificador da operação.
          example:
            cardBrand: Visa
            success: true
            errors: []
            traceKey: 371dc5c9-227f-4937-a02f-03c2b5d0e86b
    '400':
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Não autenticado / token inválido
  security:
  - bearerAuth: []
  servers:
  - url: https://portal-api.safrapay.com.br
    description: Produção (Portal API)
  - url: https://portal-api-hml.safrapay.com.br
    description: Homologação (Portal API)
