delete:
  tags:
  - Cartão Protegido
  summary: DELETE /card/{cardId}
  operationId: delete_v2_card_cardId
  parameters:
  - name: cardId
    in: path
    required: true
    schema:
      type: string
    description: O id de um cartão.
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                description: Se o endpoint processou a requisição com sucesso.
              errors:
                type: array
                items:
                  type: object
                  properties:
                    errorCode:
                      type: integer
                      format: int32
                      description: Código do erro.
                    message:
                      type: string
                      description: Mensagem para identificar qual foi o erro retornado.
                description: 'Se success: false , esse array contem a descrição dos erros retornados.'
              traceKey:
                type: string
                description: Identificador da operação.
          example:
            success: true
            errors: []
            traceKey: string
    '400':
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Não autenticado / token inválido
  security:
  - bearerAuth: []
