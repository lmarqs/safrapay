  - Recorrência e Planos
  summary: DELETE /plan
  operationId: delete_v2_plan
  parameters:
  - name: planId
    in: query
    required: true
    schema:
      type: string
    description: O ID do plano.
  responses:
    '200':
      description: Sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
