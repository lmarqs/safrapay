type: object
properties:
  success:
    type: boolean
  errors:
    type: array
    items:
      type: object
      properties:
        errorCode:
          type: integer
          format: int32
        message:
          type: string
        field:
          type: string
          description: Campo relacionado ao erro, quando aplicável.
  traceKey:
    type: string
    description: Identificador da operação (para suporte).
